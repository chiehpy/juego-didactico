<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Separa Residuos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Lilita+One&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES
   ============================================================ */
:root {
  --bg-primary: #22c55e;
  --bg-secondary: #F7F7F7;
  --bg-border: #E5E5E5;

  --accent-green: #58CC02;
  --accent-green-dark: #58A700;
  --accent-blue: #1CB0F6;
  --accent-blue-dark: #1899D6;
  --accent-red: #FF4B4B;
  --accent-yellow: #FFC800;
  --accent-orange: #FF9600;

  --bin-blue: #3b82f6;
  --bin-blue-dark: #2563eb;
  --bin-yellow: #eab308;
  --bin-yellow-dark: #ca8a04;
  --bin-green: #22c55e;
  --bin-green-dark: #16a34a;
  --bin-black: #4b5563;
  --bin-black-dark: #1f2937;

  --text-primary: #1A1A1A;
  --text-secondary: #2D2D2D;
  --text-muted: #2D2D2D;

  --token-bg: #FFFFFF;
  --token-border: #E5E5E5;

  --font-display: 'Lilita One', cursive;
  --font-body: 'Outfit', sans-serif;

  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --radius-xl: 40px;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  user-select: none;
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  touch-action: none;
}

body {
  display: flex; justify-content: center; align-items: center;
  background: var(--bg-primary);
}

/* ============================================================
   GAME WRAPPER
   ============================================================ */
#game-wrapper {
  width: 100%; height: 100vh;
  position: relative; overflow: hidden;
}

/* ============================================================
   SCREENS
   ============================================================ */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.screen-panel {
  position: absolute; inset: 90px 70px;
  background: rgba(255, 250, 240, 0.88);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius-lg);
  border: none;
  box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 20px rgba(0,0,0,0.3);
  z-index: 0;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ============================================================
   PARTICLES
   ============================================================ */
.bg-mosaic {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background: url('logo-funes.png') repeat;
  background-size: 180px 180px;
  opacity: 1;
  transform: rotate(0deg);
}

/* ============================================================
   START SCREEN
   ============================================================ */
.start-logo { position: relative; z-index: 1; margin-bottom: 12px; }

.start-icon {
  width: 100px; height: 100px; margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 64px;
  background: linear-gradient(135deg, rgba(88,204,2,0.15), rgba(28,176,246,0.15));
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(88,204,2,0.2);
  animation: iconBob 3s ease-in-out infinite;
}
@keyframes iconBob {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.start-title {
  font-family: var(--font-display); font-size: clamp(44px, 11vw, 60px);
  text-align: center; line-height: 1; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--accent-green) 0%, var(--accent-blue) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(88,204,2,0.2)); margin-bottom: 4px;
}
.start-subtitle {
  font-family: var(--font-display); font-size: clamp(20px, 5vw, 26px);
  color: var(--text-secondary); letter-spacing: 6px; text-transform: uppercase;
  text-align: center; opacity: 0.7; margin-bottom: 32px;
}
.start-instructions {
  font-size: 18px; color: var(--text-muted); text-align: center;
  max-width: 340px; line-height: 1.7; margin-bottom: 48px; z-index: 1; position: relative;
}
.start-instructions strong { color: var(--accent-green); font-weight: 600; }

.btn-play {
  position: relative; z-index: 1; width: 240px; height: 76px; border: none;
  border-radius: var(--radius-xl); font-family: var(--font-display); font-size: 32px;
  letter-spacing: 2px; color: #fff;
  background: var(--accent-green);
  cursor: pointer;
  box-shadow: 0 6px 0 var(--accent-green-dark);
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-play:active { transform: translateY(6px); box-shadow: 0 0 0 var(--accent-green-dark); }

/* ============================================================
   GAME SCREEN
   ============================================================ */
#screen-game { justify-content: flex-start; padding: 103px 83px 103px; overflow: hidden; }

.game-hud {
  width: 100%; min-height: 15vh;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 clamp(10px, 3vw, 30px); margin-bottom: 10px; z-index: 10;
  flex-shrink: 0;
}
.hud-logo { height: 80%; max-height: 12vh; object-fit: contain; flex-shrink: 0; }
.hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: clamp(80px, 15vw, 120px); }
.hud-fichas { display: flex; flex-direction: column; align-items: center; gap: 2px; z-index: 10; margin-top: -4px; }
.hud-label { font-size: clamp(12px, 1.5vh, 16px); text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); font-weight: 600; }
.hud-value { font-family: var(--font-display); font-size: clamp(52px, 7vh, 72px); line-height: 1; color: var(--text-primary); }
.hud-value.timer { color: var(--accent-blue); transition: color 0.3s; }
.hud-value.timer.warning { color: var(--accent-orange); }
.hud-value.timer.danger { color: var(--accent-red); animation: timerPulse 0.5s ease-in-out infinite; }
@keyframes timerPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.hud-value.score { color: var(--accent-green); }
.hud-label { color: var(--text-muted); }

.progress-bar-track {
  width: 100%; height: 8px; background: var(--bg-border);
  border-radius: 4px; margin-bottom: 12px; overflow: hidden; z-index: 10;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
  border-radius: 4px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

/* Token area */
.token-area {
  flex: 1; width: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; z-index: 5; min-height: 0;
}

/* Waste token */
.waste-token {
  width: clamp(170px, 42vw, 290px); height: clamp(170px, 42vw, 290px);
  background: var(--token-bg); border: 2px solid var(--token-border);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  cursor: grab; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  position: relative; z-index: 50;
}
.waste-token:active { cursor: grabbing; }
.waste-token.dragging {
  transform: scale(1.08);
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  border-color: var(--accent-blue); z-index: 100;
}
.waste-token .token-emoji { font-size: clamp(54px, 14vw, 68px); line-height: 1; }
.waste-token .token-icon { width: clamp(64px, 16vw, 90px); height: auto; pointer-events: none; }
.waste-token .token-icon.icon-md { width: clamp(83px, 20.8vw, 117px); }
.waste-token .token-icon.icon-lg { width: clamp(100px, 25vw, 140px); }
.waste-token .token-icon.icon-outlined, .drag-ghost.ghost-outlined img { filter: drop-shadow(2px 0 0 #000) drop-shadow(-2px 0 0 #000) drop-shadow(0 2px 0 #000) drop-shadow(0 -2px 0 #000); }
.waste-token .token-name { font-size: clamp(17px, 4.5vw, 22px); font-weight: 700; text-align: center; color: var(--text-primary); padding: 0 12px; line-height: 1.3; }
.waste-token .token-hint { font-size: clamp(13px, 3.5vw, 16px); color: var(--text-muted); font-weight: 400; }

.waste-token.enter { animation: tokenEnter 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes tokenEnter { 0%{opacity:0;transform:scale(0.5) translateY(30px)} 100%{opacity:1;transform:scale(1) translateY(0)} }

.waste-token.correct-exit { animation: correctExit 0.5s cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes correctExit { 0%{opacity:1;transform:scale(1)} 50%{transform:scale(1.15)} 100%{opacity:0;transform:scale(0.3)} }

.waste-token.wrong-exit { animation: wrongExit 0.5s cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes wrongExit {
  0%{opacity:1;transform:translateX(0)} 15%{transform:translateX(-20px)} 30%{transform:translateX(18px)}
  45%{transform:translateX(-14px)} 60%{transform:translateX(10px)} 100%{opacity:0;transform:translateX(0) scale(0.5)}
}

/* Feedback flash */
.feedback-flash { position:absolute; inset:0; border-radius:var(--radius-lg); pointer-events:none; opacity:0; z-index:200; }
.feedback-flash.correct { background:radial-gradient(circle at center,rgba(52,211,153,0.35) 0%,transparent 70%); animation:flashIn 0.6s ease-out forwards; }
.feedback-flash.wrong { background:radial-gradient(circle at center,rgba(239,68,68,0.35) 0%,transparent 70%); animation:flashIn 0.6s ease-out forwards; }
@keyframes flashIn { 0%{opacity:1;transform:scale(0.5)} 100%{opacity:0;transform:scale(2.5)} }

/* Score popup */
.score-popup { position:absolute; font-family:var(--font-display); font-size:52px; pointer-events:none; z-index:300; animation:scoreFloat 0.8s cubic-bezier(0.4,0,0.2,1) forwards; }
.score-popup.positive { color:var(--accent-green); text-shadow:0 0 10px rgba(88,204,2,0.3); }
.score-popup.negative { color:var(--accent-red); text-shadow:0 0 10px rgba(255,75,75,0.3); }
@keyframes scoreFloat { 0%{opacity:1;transform:translateY(0) scale(0.5)} 30%{transform:translateY(-20px) scale(1.2)} 100%{opacity:0;transform:translateY(-80px) scale(0.8)} }

/* ============================================================
   CONTAINERS (TRASH BINS)
   ============================================================ */
.containers-area { width: 100%; z-index: 10; padding: 8px 0 6px; display: flex; align-items: flex-end; justify-content: center; flex-shrink: 0; }

.containers-row {
  display: flex; justify-content: center; gap: clamp(4px, 1.2vw, 12px); margin-bottom: 0; width: 100%;
}

.container-bin {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; align-items: center; gap: clamp(4px, 1vh, 10px);
  padding: clamp(12px, 2.5vh, 28px) clamp(6px, 1.5vw, 16px) clamp(10px, 2.2vh, 24px);
  border-radius: var(--radius-md);
  border: 2.5px solid transparent;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  position: relative; cursor: default;
}

.container-bin .bin-img {
  width: 100%; max-width: clamp(70px, 12vw, 130px); height: auto; transition: transform 0.2s;
  pointer-events: none;
}

/* Color filters: base image is green */
.bin-blue .bin-img { filter: hue-rotate(60deg) saturate(1.5) brightness(1.1); }
.bin-yellow .bin-img { filter: saturate(0) sepia(1) hue-rotate(15deg) saturate(5) brightness(1.3); }
.bin-green .bin-img { filter: none; }
.bin-black .bin-img { filter: saturate(0) brightness(0.7); }

.container-bin .bin-label {
  font-size: clamp(14px, 1.8vh, 20px); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; text-align: center; line-height: 1.2;
}

/* Bin color themes */
.bin-blue { background: rgba(59,130,246,0.18); border-color: rgba(59,130,246,0.4); }
.bin-yellow { background: rgba(234,179,8,0.18); border-color: rgba(234,179,8,0.4); }
.bin-green { background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.4); }
.bin-black { background: rgba(75,85,99,0.18); border-color: rgba(75,85,99,0.4); }
.container-bin .bin-label { color: var(--text-primary); }

/* Drag over */
.container-bin.drag-over { transform: scale(1.1); animation: binShake 0.4s ease-in-out infinite; }
@keyframes binShake { 0%,100%{transform:scale(1.1) rotate(0deg)} 25%{transform:scale(1.1) rotate(-3deg)} 75%{transform:scale(1.1) rotate(3deg)} }
.container-bin.drag-over.bin-blue { border-color: var(--bin-blue); box-shadow: 0 0 28px rgba(59,130,246,0.4); }
.container-bin.drag-over.bin-yellow { border-color: var(--bin-yellow); box-shadow: 0 0 28px rgba(234,179,8,0.4); }
.container-bin.drag-over.bin-green { border-color: var(--bin-green); box-shadow: 0 0 28px rgba(34,197,94,0.4); }
.container-bin.drag-over.bin-black { border-color: var(--bin-black); box-shadow: 0 0 28px rgba(75,85,99,0.4); }

.container-bin.correct-flash { animation: binCorrect 0.5s ease-out; }
@keyframes binCorrect { 0%{transform:scale(1)} 30%{transform:scale(1.15)} 100%{transform:scale(1)} }

.container-bin.wrong-flash { animation: binWrong 0.4s ease-out; }
@keyframes binWrong { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

/* ============================================================
   RESULTS SCREEN
   ============================================================ */
#screen-results { gap: 20px; }

.results-icon {
  width: 110px; height: 110px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 58px; margin-bottom: 8px;
  animation: resultsBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; opacity: 0;
}
.results-icon.excellent { background: rgba(88,204,2,0.12); box-shadow:0 4px 20px rgba(88,204,2,0.15); }
.results-icon.good { background: rgba(28,176,246,0.12); box-shadow:0 4px 20px rgba(28,176,246,0.15); }
.results-icon.try-again { background: rgba(255,200,0,0.15); box-shadow:0 4px 20px rgba(255,200,0,0.15); }
@keyframes resultsBounce { 0%{opacity:0;transform:scale(0)} 60%{transform:scale(1.15)} 100%{opacity:1;transform:scale(1)} }

.results-title {
  font-family: var(--font-display); font-size: clamp(34px,8vw,48px);
  text-align: center; animation: rSlide 0.5s cubic-bezier(0.4,0,0.2,1) 0.15s forwards; opacity: 0;
}
@keyframes rSlide { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }

.results-message {
  font-size: 18px; color: var(--text-muted); text-align: center;
  max-width: 300px; line-height: 1.5;
  animation: rSlide 0.5s cubic-bezier(0.4,0,0.2,1) 0.25s forwards; opacity: 0;
}

.results-stats {
  display: flex; gap: 20px;
  animation: rSlide 0.5s cubic-bezier(0.4,0,0.2,1) 0.35s forwards; opacity: 0;
}

.stat-card {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 16px 22px; background: var(--bg-secondary);
  border: 1px solid var(--bg-border); border-radius: var(--radius-md);
}
.stat-value { font-family: var(--font-display); font-size: 38px; line-height: 1; }
.stat-value.green { color: var(--accent-green); }
.stat-value.red { color: var(--accent-red); }
.stat-value.blue { color: var(--accent-blue); }
.stat-label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

.btn-replay {
  width: 240px; height: 68px; border: none;
  border-radius: var(--radius-xl); background: var(--accent-blue);
  font-family: var(--font-display); font-size: 24px; letter-spacing: 1px;
  color: #fff; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 6px 0 var(--accent-blue-dark);
  animation: rSlide 0.5s cubic-bezier(0.4,0,0.2,1) 0.5s forwards; opacity: 0; margin-top: 12px;
}
.btn-replay:active { transform: translateY(6px); box-shadow: 0 0 0 var(--accent-blue-dark); }

/* Drag ghost */
.drag-ghost { position: fixed; pointer-events: none; z-index: 9999; transition: none; }

/* Utilities */
.hidden { display: none !important; }
a, button, .container-bin { touch-action: manipulation; }
.waste-token { touch-action: none; }
</style>
</head>
<body>

<div id="game-wrapper">
  <div class="bg-mosaic"></div>

  <!-- ======================== START SCREEN ======================== -->
  <div class="screen active" id="screen-start">
    <div class="screen-panel"></div>
    <div class="start-logo">
      <div class="start-icon">♻️</div>
    </div>
    <h1 class="start-title">SEPARA</h1>
    <p class="start-subtitle">Residuos</p>
    <p class="start-instructions">
      <strong>Arrastra</strong> cada residuo al tacho del color correcto.<br>
      ¡Clasifica todos antes de que se acabe el tiempo!
    </p>
    <button class="btn-play" onclick="startGame()">¡JUGAR!</button>
  </div>

  <!-- ======================== GAME SCREEN ======================== -->
  <div class="screen" id="screen-game">
    <div class="screen-panel"></div>
    <div class="game-hud">
      <div class="hud-item">
        <span class="hud-label">Tiempo</span>
        <span class="hud-value timer" id="hud-timer">60</span>
      </div>
      <img class="hud-logo" src="logo-funes.png" alt="Logo Gobierno de Funes">
      <div class="hud-item">
        <span class="hud-label">Puntaje</span>
        <span class="hud-value score" id="hud-score">0</span>
      </div>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="hud-fichas">
      <span class="hud-label">Fichas</span>
      <span class="hud-value" id="hud-tokens">0/20</span>
    </div>

    <div class="token-area" id="token-area"></div>

    <!-- 4 TACHOS -->
    <div class="containers-area">
      <div class="containers-row">

        <!-- AZUL - Papel y Cartón -->
        <div class="container-bin bin-blue" data-category="paper">
          <img class="bin-img" src="bin.png" alt="Papel y Cartón">
          <span class="bin-label">Papel y<br>Cartón</span>
        </div>

        <!-- AMARILLO - Plásticos y Latas -->
        <div class="container-bin bin-yellow" data-category="plastic">
          <img class="bin-img" src="bin.png" alt="Plásticos y Latas">
          <span class="bin-label">Plásticos<br>y Latas</span>
        </div>

        <!-- VERDE - Vidrio -->
        <div class="container-bin bin-green" data-category="glass">
          <img class="bin-img" src="bin.png" alt="Vidrio">
          <span class="bin-label">Vidrio</span>
        </div>

        <!-- NEGRO - No Reciclable -->
        <div class="container-bin bin-black" data-category="trash">
          <img class="bin-img" src="bin-nopet.png" alt="No Reciclable">
          <span class="bin-label">No<br>Reciclable</span>
        </div>

      </div>
    </div>
  </div>

  <!-- ======================== RESULTS SCREEN ======================== -->
  <div class="screen" id="screen-results">
    <div class="screen-panel"></div>
    <div class="results-icon" id="results-icon"></div>
    <h2 class="results-title" id="results-title"></h2>
    <p class="results-message" id="results-message"></p>
    <div class="results-stats">
      <div class="stat-card">
        <span class="stat-value green" id="stat-correct">0</span>
        <span class="stat-label">Aciertos</span>
      </div>
      <div class="stat-card">
        <span class="stat-value red" id="stat-wrong">0</span>
        <span class="stat-label">Errores</span>
      </div>
      <div class="stat-card">
        <span class="stat-value blue" id="stat-score">0</span>
        <span class="stat-label">Puntaje</span>
      </div>
    </div>
    <button class="btn-replay" onclick="startGame()">¡JUGAR DE NUEVO!</button>
  </div>
</div>

<script>
/* ============================================================
   CONFIGURATION
   ============================================================ */
const CONFIG = {
  totalTokens: 20,
  gameTime: 60,
  correctPoints: 1,
  penaltyPoints: -1,
};

/* ============================================================
   WASTE DATA - 4 categories (kid-friendly items)
   ============================================================ */
const WASTE_ITEMS = [
  // AZUL - Papel y Cartón
  { name: 'Periódico',           emoji: '📰', icon: 'icons/newspaper.png', category: 'paper' },
  { name: 'Caja de cartón',      emoji: '📦', icon: 'icons/open-box.png', category: 'paper' },
  { name: 'Hoja de papel',       emoji: '📄', icon: 'icons/paper.png', category: 'paper' },
  { name: 'Libro',               emoji: '📖', icon: 'icons/book.png', category: 'paper' },
  { name: 'Rollo de cartón',     emoji: '🧻', icon: 'icons/paper-roll.png', iconClass: 'icon-md icon-outlined', category: 'paper' },
  { name: 'Cuaderno viejo',      emoji: '📓', icon: 'icons/notebook.png', category: 'paper' },
  { name: 'Sobre de carta',      emoji: '✉️', icon: 'icons/email.png', category: 'paper' },
  { name: 'Cartón de huevos',   emoji: '🥚', icon: 'icons/egg-carton.png', category: 'paper' },

  // AMARILLO - Plásticos y Latas
  { name: 'Botella plástica',    emoji: '🧴', icon: 'icons/water-bottle.png', category: 'plastic' },
  { name: 'Lata de gaseosa',     emoji: '🥫', icon: 'icons/soda-can.png', category: 'plastic' },
  { name: 'Bolsa plástica',      emoji: '🛍️', icon: 'icons/poly-bag.png', category: 'plastic' },
  { name: 'Envase de shampoo',   emoji: '🧴', icon: 'icons/shampoo.png', category: 'plastic' },
  { name: 'Lata de atún',        emoji: '🥫', icon: 'icons/tuna-can.png', category: 'plastic' },

  // VERDE - Vidrio
  { name: 'Botella de vidrio',   emoji: '🍾', icon: 'icons/champagne.png', category: 'glass' },
  { name: 'Frasco de vidrio',    emoji: '🫙', icon: 'icons/frasco.png', iconClass: 'icon-lg', category: 'glass' },
  { name: 'Vaso de vidrio roto', emoji: '🥃', icon: 'icons/broken-glass.png', category: 'glass' },

  // NEGRO - No Reciclable
  { name: 'Cáscara de banana',   emoji: '🍌', icon: 'icons/banana.png', category: 'trash' },
  { name: 'Restos de comida',   emoji: '🍗', icon: 'icons/leftover.png', category: 'trash' },
  { name: 'Esponja vieja',       emoji: '🧽', icon: 'icons/sponge.png', category: 'trash' },
  { name: 'Cepillo de dientes',  emoji: '🪥', icon: 'icons/toothbrush.png', category: 'trash' },
];

/* ============================================================
   GAME STATE
   ============================================================ */
let state = {
  tokens: [], currentIndex: 0, score: 0, correct: 0, wrong: 0,
  timeLeft: CONFIG.gameTime, timerInterval: null, isPlaying: false,
  isDragging: false, dragOffsetX: 0, dragOffsetY: 0, activeGhost: null,
};

/* ============================================================
   DOM REFERENCES
   ============================================================ */
const $screens = {
  start: document.getElementById('screen-start'),
  game: document.getElementById('screen-game'),
  results: document.getElementById('screen-results'),
};
const $hud = {
  timer: document.getElementById('hud-timer'),
  tokens: document.getElementById('hud-tokens'),
  score: document.getElementById('hud-score'),
};
const $tokenArea = document.getElementById('token-area');
const $progressFill = document.getElementById('progress-fill');
const $containers = document.querySelectorAll('.container-bin');

/* ============================================================
   PARTICLES
   ============================================================ */

/* ============================================================
   SCREEN MANAGEMENT
   ============================================================ */
function showScreen(name) {
  Object.values($screens).forEach(s => s.classList.remove('active'));
  $screens[name].classList.add('active');
}

/* ============================================================
   SHUFFLE & SELECT
   ============================================================ */
function selectTokens() {
  const shuffled = [...WASTE_ITEMS].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, CONFIG.totalTokens);
}

/* ============================================================
   START GAME
   ============================================================ */
function startGame() {
  state.tokens = selectTokens();
  state.currentIndex = 0;
  state.score = 0; state.correct = 0; state.wrong = 0;
  state.timeLeft = CONFIG.gameTime; state.isPlaying = true;
  updateHUD(); showScreen('game');
  setTimeout(() => { renderToken(); startTimer(); }, 300);
}

/* ============================================================
   TIMER
   ============================================================ */
function startTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0) endGame();
  }, 1000);
}

function updateTimerDisplay() {
  $hud.timer.textContent = state.timeLeft;
  $hud.timer.classList.remove('warning','danger');
  if (state.timeLeft <= 5) $hud.timer.classList.add('danger');
  else if (state.timeLeft <= 15) $hud.timer.classList.add('warning');
}

/* ============================================================
   HUD
   ============================================================ */
function updateHUD() {
  $hud.timer.textContent = state.timeLeft;
  $hud.tokens.textContent = state.currentIndex + '/' + CONFIG.totalTokens;
  $hud.score.textContent = state.score;
  $progressFill.style.width = (state.currentIndex / CONFIG.totalTokens * 100) + '%';
  updateTimerDisplay();
}

/* ============================================================
   RENDER TOKEN
   ============================================================ */
function renderToken() {
  if (state.currentIndex >= state.tokens.length) { endGame(); return; }
  const item = state.tokens[state.currentIndex];
  $tokenArea.innerHTML = '';
  const token = document.createElement('div');
  token.className = 'waste-token enter'; token.id = 'current-token';
  const iconCls = item.iconClass ? ' ' + item.iconClass : '';
  const visual = item.icon
    ? `<img class="token-icon${iconCls}" src="${item.icon}" alt="${item.name}">`
    : `<span class="token-emoji">${item.emoji}</span>`;
  token.innerHTML = `
    ${visual}
    <span class="token-name">${item.name}</span>
    <span class="token-hint">¡Arrastra al tacho correcto!</span>
  `;
  token.dataset.category = item.category;
  token.addEventListener('touchstart', onDragStart, { passive: false });
  token.addEventListener('mousedown', onDragStart);
  $tokenArea.appendChild(token);
}

/* ============================================================
   DRAG & DROP
   ============================================================ */
function onDragStart(e) {
  if (!state.isPlaying || state.isDragging) return;
  e.preventDefault();
  const token = document.getElementById('current-token');
  if (!token) return;
  state.isDragging = true;
  const pt = e.touches ? e.touches[0] : e;
  const rect = token.getBoundingClientRect();
  state.dragOffsetX = pt.clientX - rect.left;
  state.dragOffsetY = pt.clientY - rect.top;

  const visualEl = token.querySelector('.token-icon') || token.querySelector('.token-emoji');
  const visualRect = visualEl.getBoundingClientRect();
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost'; ghost.id = 'drag-ghost';
  if (visualEl.classList.contains('icon-outlined')) ghost.classList.add('ghost-outlined');
  ghost.style.width = visualRect.width+'px'; ghost.style.height = visualRect.height+'px';
  ghost.style.left = visualRect.left+'px'; ghost.style.top = visualRect.top+'px';
  ghost.style.filter = 'drop-shadow(0 0 12px rgba(0,0,0,0.5)) drop-shadow(0 0 24px rgba(0,0,0,0.25))';
  ghost.style.transform = 'scale(1.2)';
  if (visualEl.classList.contains('token-icon')) {
    const img = document.createElement('img');
    img.src = visualEl.src; img.style.width = '100%'; img.style.height = '100%';
    ghost.appendChild(img);
  } else {
    ghost.style.fontSize = getComputedStyle(visualEl).fontSize;
    ghost.style.lineHeight = '1';
    ghost.textContent = visualEl.textContent;
  }
  state.dragOffsetX = pt.clientX - visualRect.left;
  state.dragOffsetY = pt.clientY - visualRect.top;
  document.body.appendChild(ghost);
  state.activeGhost = ghost;
  token.classList.remove('enter');
  token.style.opacity = '0';

  if (e.touches) {
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('touchend', onDragEnd);
  } else {
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
  }
}

function onDragMove(e) {
  if (!state.isDragging || !state.activeGhost) return;
  e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  state.activeGhost.style.left = (pt.clientX - state.dragOffsetX) + 'px';
  state.activeGhost.style.top = (pt.clientY - state.dragOffsetY) + 'px';

  const gr = state.activeGhost.getBoundingClientRect();
  let bestBin = null, bestOverlap = 0;
  $containers.forEach(bin => {
    const br = bin.getBoundingClientRect();
    const overlapX = Math.max(0, Math.min(gr.right, br.right) - Math.max(gr.left, br.left));
    const overlapY = Math.max(0, Math.min(gr.bottom, br.bottom) - Math.max(gr.top, br.top));
    const overlap = overlapX * overlapY;
    if (overlap > bestOverlap) { bestOverlap = overlap; bestBin = bin; }
    bin.classList.remove('drag-over');
  });
  if (bestBin && bestOverlap > 400) bestBin.classList.add('drag-over');
}

function onDragEnd(e) {
  if (!state.isDragging) return;
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);

  let droppedBin = null;
  let bestOverlap = 0;
  const gr = state.activeGhost.getBoundingClientRect();
  $containers.forEach(bin => {
    bin.classList.remove('drag-over');
    const br = bin.getBoundingClientRect();
    const overlapX = Math.max(0, Math.min(gr.right, br.right) - Math.max(gr.left, br.left));
    const overlapY = Math.max(0, Math.min(gr.bottom, br.bottom) - Math.max(gr.top, br.top));
    const overlap = overlapX * overlapY;
    if (overlap > bestOverlap) { bestOverlap = overlap; droppedBin = bin; }
  });
  if (bestOverlap < 400) droppedBin = null;

  if (state.activeGhost) { state.activeGhost.remove(); state.activeGhost = null; }
  else { state.isDragging = false; return; }
  state.isDragging = false;

  const token = document.getElementById('current-token');
  if (droppedBin && token) {
    const isCorrect = token.dataset.category === droppedBin.dataset.category;
    isCorrect ? handleCorrect(token, droppedBin) : handleWrong(token, droppedBin);
  } else if (token) {
    token.style.opacity = '1';
  }
}

/* ============================================================
   CORRECT / WRONG
   ============================================================ */
function handleCorrect(token, bin) {
  state.score += CONFIG.correctPoints; state.correct++;
  token.style.opacity = '1'; token.classList.remove('enter'); token.classList.add('correct-exit');
  showFeedbackFlash('correct'); showScorePopup('+'+CONFIG.correctPoints, 'positive');
  bin.classList.add('correct-flash'); setTimeout(() => bin.classList.remove('correct-flash'), 500);
  advanceToken();
}

function handleWrong(token, bin) {
  state.score += CONFIG.penaltyPoints; state.wrong++;
  token.style.opacity = '1'; token.classList.remove('enter'); token.classList.add('wrong-exit');
  showFeedbackFlash('wrong'); showScorePopup(CONFIG.penaltyPoints.toString(), 'negative');
  bin.classList.add('wrong-flash'); setTimeout(() => bin.classList.remove('wrong-flash'), 400);
  advanceToken();
}

function advanceToken() {
  state.currentIndex++; updateHUD();
  if (state.currentIndex >= CONFIG.totalTokens) setTimeout(() => endGame(), 600);
  else setTimeout(() => renderToken(), 500);
}

/* ============================================================
   FEEDBACK
   ============================================================ */
function showFeedbackFlash(type) {
  const f = document.createElement('div'); f.className = 'feedback-flash '+type;
  $tokenArea.appendChild(f); setTimeout(() => f.remove(), 600);
}
function showScorePopup(text, type) {
  const p = document.createElement('div'); p.className = 'score-popup '+type;
  p.textContent = text; p.style.top = '40%'; p.style.left = '50%';
  p.style.transform = 'translateX(-50%)';
  $tokenArea.appendChild(p); setTimeout(() => p.remove(), 800);
}

/* ============================================================
   END GAME
   ============================================================ */
function endGame() {
  state.isPlaying = false; clearInterval(state.timerInterval);
  const pct = CONFIG.totalTokens > 0 ? (state.correct / CONFIG.totalTokens) * 100 : 0;
  const $i = document.getElementById('results-icon');
  const $t = document.getElementById('results-title');
  const $m = document.getElementById('results-message');
  $i.className = 'results-icon';

  if (pct >= 80) {
    $i.classList.add('excellent'); $i.textContent = '🌟';
    $t.textContent = '¡Excelente!'; $t.style.color = 'var(--accent-green)';
    $m.textContent = '¡Sos un campeón del reciclaje! El planeta te lo agradece.';
  } else if (pct >= 50) {
    $i.classList.add('good'); $i.textContent = '👏';
    $t.textContent = '¡Muy bien!'; $t.style.color = 'var(--accent-blue)';
    $m.textContent = '¡Vas muy bien! Seguí practicando para ser un experto.';
  } else {
    $i.classList.add('try-again'); $i.textContent = '💪';
    $t.textContent = '¡Volvé a intentar!'; $t.style.color = 'var(--accent-orange)';
    $m.textContent = '¡No te rindas! Cada vez vas a separar mejor.';
  }

  document.getElementById('stat-correct').textContent = state.correct;
  document.getElementById('stat-wrong').textContent = state.wrong;
  document.getElementById('stat-score').textContent = Math.max(0, state.score);
  showScreen('results');
}

/* Prevent scroll while dragging */
document.addEventListener('touchmove', function(e) {
  if (state.isDragging) e.preventDefault();
}, { passive: false });

</script>
</body>
